name: 🚀 Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js với cache
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies (trên GitHub runner - 7GB RAM)
      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Build Vite (trên GitHub runner - KHÔNG build trên EC2)
      - name: 🔨 Build Vite
        run: npm run build

      # 5. Upload dist/ lên EC2
      - name: 📤 Deploy dist to EC2
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
          SOURCE: "dist/"
          TARGET: /home/ubuntu/English-Center-FE/
          SCRIPT_AFTER: |
            echo "✅ Frontend deployed successfully!"
